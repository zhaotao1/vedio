# 侏罗纪场景 ~50s 测试 — HQ pass
# 14 段 × 121 帧 (重叠 4 latent ≈ 32 像素帧)
# 总帧数 = 121 + 13 × (121 - 32) = 1278 帧
# 时长 = 1278 / 24 ≈ 53.3 秒
#
# Quality knobs applied vs. previous low-res run:
#   - resolution 512×768  → 704×1216    (~3.3× more pixels)
#   - quantization fp8-cast → bf16       (no weight cast loss, sharper detail)
#   - enhance_prompt false → true        (Gemma rewrites seg-0 prompt)
#   - overlap_latent_frames 2 → 4        (smoother segment stitching)
#   - overlap_strength 0.5 → 0.6
#   - streaming_overlap_latent_frames 2 → 4
#   - vae_grid_overlap_latent 2 → 4      (less visible grid seams)
# NOTE: bf16 + 704×1216 will push per-tile VAE peak to ~40-60 GB. If we OOM
# during decode, the first thing to try is quantization: fp8-cast.

model:
  distilled_checkpoint_path: /root/sj-tmp/models/ltx-2.3/ltx-2.3-22b-distilled-1.1.safetensors
  spatial_upsampler_path:    /root/sj-tmp/models/ltx-2.3/ltx-2.3-spatial-upscaler-x2-1.1.safetensors
  gemma_root:                /root/sj-tmp/models/gemma-3-12b
  loras: []
  quantization: bf16
  offload: cpu
  compile: false

common:
  height:      704
  width:       1216
  frame_rate:  24.0
  seed:        0
  output_path: /tmp/scene_jurassic_60s.mp4
  enhance_prompt: true

looping:
  chunk_num_frames: 121         # 8*15+1, 每段 ≈5s
  overlap_latent_frames: 4
  overlap_strength: 0.6
  enable_negative_index: true
  negative_index_anchor_latent_frames: 2
  negative_index_strength: 0.3
  negative_frame_offset: -16
  adain_factor: 0.5
  # Level-2 streaming decode: keep assembled latent on CPU, decode in
  # 16-latent-frame macro-chunks (≈ 128 pixel frames each) with a 4-latent
  # cross-fade for smoother chunk stitching.
  streaming_decode: true
  streaming_chunk_latent_frames: 16
  streaming_overlap_latent_frames: 4

  # ComfyUI-style spatial grid tiling for the VAE decode (bypasses
  # ltx-core's buggy `tiled_decode`). Splits each macro-chunk latent into
  # a vertical_tiles × horizontal_tiles grid, decodes each tile via the
  # un-tiled VAE, and blends with linear ramps over the overlap region.
  # For 704×1216 (latent 22×38) a 2×2 grid → per-tile latent ~11×19
  # (+ 4-latent overlap each side). overlap=4 → ~128 pixel-px blend band
  # which essentially hides the tile seams.
  vae_grid_vertical_tiles: 2
  vae_grid_horizontal_tiles: 2
  vae_grid_overlap_latent: 4

# vae_tiling is kept only as a fallback for the chunk_latent_frames >= t_lat
# single-shot path; with grid tiling enabled above it is unused on the
# per-chunk path. We still ship a small spatial tile so any internal
# ltx-core code that consults it does not OOM.
vae_tiling:
  temporal_tile_frames: 16
  temporal_overlap_frames: 8
  spatial_tile_pixels: 64
  spatial_overlap_pixels: 32

prompts:
  - "Aerial wide shot soaring over a vast Jurassic valley at sunrise, lush primeval ferns, towering ancient conifers, distant volcanic mountains exhaling thin smoke, cinematic golden hour lighting, photorealistic, slow forward camera motion."
  - "The camera descends through morning mist into a dense fern-covered jungle, shafts of warm sunlight breaking through giant ginkgo leaves, dewdrops glittering, a small flock of pterosaurs gliding across the frame, photorealistic, smooth dolly-in."
  - "A massive herd of long-necked Brachiosaurus wading through a wide shallow river, water splashing around their legs, ripples catching the sunlight, lush vegetation on both banks, epic wide shot, cinematic, slow lateral pan."
  - "Close-up of a Brachiosaurus lowering its enormous head to drink, water droplets falling from its lips, scales and wet skin texture in fine detail, soft warm rim light, shallow depth of field, photorealistic."
  - "A grazing herd of Triceratops emerges from a clearing, dust kicking up under their feet, sunlight catching on their horns and frills, distant Brachiosaurus visible in the background, epic establishing shot, slow tracking camera."
  - "Sudden tension: the herd freezes, ears twitching; the camera slowly tilts up to a dark treeline where ferns begin to tremble, dramatic shadowy lighting, ominous mood, photorealistic."
  - "A towering Tyrannosaurus Rex bursts out from the trees in slow motion, mouth open with a deafening roar, leaves and dust exploding outward, dramatic side lighting, cinematic low-angle shot, photorealistic."
  - "The Triceratops herd stampedes across the plain, ground shaking, T-Rex chasing through the dust cloud, fast tracking shot following the action from the side, motion blur, golden afternoon light, photorealistic."
  - "A lone Triceratops turns to face the T-Rex, lowering its head and horns defensively, dust swirling around them, dramatic standoff, low-angle close-up, intense cinematic lighting, photorealistic."
  - "Wide shot of the two giants clashing in slow motion, horns striking the T-Rex's flank, the T-Rex roaring and stumbling, dirt and grass flying, epic cinematic action, golden hour light."
  - "Overhead drone shot pulling back to reveal the prehistoric valley, the T-Rex retreating into the jungle, Triceratops herd regrouping, river glittering in late afternoon sun, sweeping camera move, photorealistic."
  - "Sunset over the Jurassic landscape, sky turning orange and purple, silhouettes of Brachiosaurus walking along the ridge line, peaceful epic vista, slow lateral camera glide, cinematic."
  - "Night falls; bioluminescent insects light up the ferns, a full moon rises over the volcanic mountains, distant dinosaur calls echoing, calm wide shot, painterly cinematic lighting, photorealistic."
  - "Final aerial pull-back shot rising high above the valley, revealing the entire Jurassic ecosystem under starlight, sweeping orchestral feeling, slow upward camera motion, photorealistic, epic finale."
